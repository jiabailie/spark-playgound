services:
  spark-master:
    image: bitnami/spark:3.5
    container_name: spark-playground-master
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - ./:/opt/spark-playground

  spark-worker:
    image: bitnami/spark:3.5
    container_name: spark-playground-worker
    depends_on:
      - spark-master
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
    ports:
      - "8081:8081"
    volumes:
      - ./:/opt/spark-playground

  jupyter:
    image: jupyter/pyspark-notebook:spark-3.5.0
    container_name: spark-playground-jupyter
    depends_on:
      - spark-master
    environment:
      JUPYTER_TOKEN: spark
      SPARK_MASTER: spark://spark-master:7077
    ports:
      - "8888:8888"
    volumes:
      - ./:/home/jovyan/work
